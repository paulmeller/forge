name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  GCP_PROJECT: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: ${{ vars.GCP_REGION || 'europe-west1' }}
  AR_REPO: forge

jobs:
  quality:
    name: Lint, typecheck, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Enable corepack + install
        run: |
          corepack enable
          corepack prepare pnpm@10.33.0 --activate
          pnpm install --frozen-lockfile
      - run: pnpm --filter @forge/web exec fumadocs-mdx
      - run: pnpm -r typecheck
      - run: pnpm -r test

  deploy-web:
    name: Deploy forge-web
    runs-on: ubuntu-latest
    needs: quality
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - uses: docker/setup-buildx-action@v3

      - name: Build and push forge-web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: |
            ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/${{ env.AR_REPO }}/web:${{ github.sha }}
            ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/${{ env.AR_REPO }}/web:latest
          cache-from: type=gha,scope=web
          cache-to: type=gha,scope=web,mode=max

      - id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: forge-web
          region: ${{ env.GCP_REGION }}
          image: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/${{ env.AR_REPO }}/web:${{ github.sha }}
          flags: |
            --port=3000
            --memory=512Mi
            --cpu=1
            --min-instances=0
            --max-instances=3
            --allow-unauthenticated
          env_vars: |
            NODE_ENV=production
            FORGE_BACKEND=gateway
            FORGE_CHAT_MODEL=anthropic:claude-sonnet-4-5-20250514
          secrets: |
            DATABASE_URL=forge-database-url:latest
            DATABASE_AUTH_TOKEN=forge-database-auth-token:latest
            BETTER_AUTH_SECRET=forge-better-auth-secret:latest
            ANTHROPIC_API_KEY=forge-anthropic-api-key:latest
            GITHUB_APP_TOKEN=forge-github-app-token:latest
            GITHUB_WEBHOOK_SECRET=forge-github-webhook-secret:latest
            FORGE_DEFAULT_AGENT_ID=forge-default-agent-id:latest
            FORGE_DEFAULT_GITHUB_VAULT_ID=forge-default-github-vault-id:latest
            OPENAI_API_KEY=forge-openai-api-key:latest

      - name: Print URL
        run: echo "Deployed to ${{ steps.deploy.outputs.url }}"

  deploy-tick:
    name: Deploy forge-tick
    runs-on: ubuntu-latest
    needs: quality
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - uses: docker/setup-buildx-action@v3

      - name: Build and push forge-tick
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/tick/Dockerfile
          push: true
          tags: |
            ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/${{ env.AR_REPO }}/tick:${{ github.sha }}
            ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/${{ env.AR_REPO }}/tick:latest
          cache-from: type=gha,scope=tick
          cache-to: type=gha,scope=tick,mode=max

      - id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: forge-tick
          region: ${{ env.GCP_REGION }}
          image: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/${{ env.AR_REPO }}/tick:${{ github.sha }}
          flags: |
            --port=8080
            --memory=512Mi
            --cpu=1
            --min-instances=0
            --max-instances=1
            --no-allow-unauthenticated
          env_vars: |
            NODE_ENV=production
            TICK_EXPECTED_AUDIENCE=https://forge-tick-btbwhux5ya-ew.a.run.app
          secrets: |
            DATABASE_URL=forge-database-url:latest
            DATABASE_AUTH_TOKEN=forge-database-auth-token:latest
            ANTHROPIC_API_KEY=forge-anthropic-api-key:latest
            GATEWAY_URL=forge-gateway-url:latest
            GATEWAY_API_KEY=forge-gateway-api-key:latest
            GATEWAY_ENVIRONMENT_ID=forge-gateway-environment-id:latest
            GITHUB_APP_TOKEN=forge-github-app-token:latest

      - name: Print URL
        run: echo "Deployed to ${{ steps.deploy.outputs.url }}"
